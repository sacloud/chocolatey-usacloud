# AppVeyor file
#   for usacloud

version: '{build}'

branches:
  only:
    - master
    - /feature*/

skip_branch_with_pr: true

max_jobs: 1

environment:
  CHOCO_API_KEY:
    secure: 53zj0CRv8S/heDM1pmY/NYXDD+mwfYJcZHwpJMrOFgAwoC+ffPNRVjF0xQiA9vKy

install:
  - ps: |
      Get-CimInstance win32_operatingsystem -Property Caption, OSArchitecture, Version | fl Caption, OSArchitecture, Version;
      $PSVersionTable;
      git --version;
      choco upgrade chocolatey -y;
      choco -v;

build_script:
  - ps: |
      $release = Invoke-RestMethod -Uri "https://api.github.com/repos/sacloud/usacloud/releases/latest"
      $version = $release.tag_name -replace "^v", ""
      echo "usacloud latest version: ${version}"

      # Check if this version is already published on Chocolatey
      try {
        $chocoSearch = choco search usacloud --exact --limit-output 2>$null
        if ($chocoSearch) {
          $chocoVersion = ($chocoSearch -split '\|')[1]
          echo "Current Chocolatey version: ${chocoVersion}"
          if ($chocoVersion -like "${version}.*") {
            echo "Version ${version} is already published on Chocolatey. Skipping build."
            Exit-AppveyorBuild
            return
          }
        }
      } catch {
        echo "Could not check Chocolatey version. Proceeding with build."
      }

      $appVeyorVersion = "${version}.${env:APPVEYOR_BUILD_VERSION}"
      echo "usacloud current version ${version} / package version ${appVeyorVersion}"

      $url32 = "https://github.com/sacloud/usacloud/releases/download/v${version}/usacloud_windows-386.zip"
      echo $url32
      $url64 = "https://github.com/sacloud/usacloud/releases/download/v${version}/usacloud_windows-amd64.zip"
      echo $url64

      Invoke-WebRequest $url32 -OutFile .\x32.zip
      Invoke-WebRequest $url64 -OutFile .\x64.zip

      $hash32 = (Get-FileHash .\x32.zip -Algorithm SHA512).Hash
      echo $hash32
      $hash64 = (Get-FileHash .\x64.zip -Algorithm SHA512).Hash
      echo $hash64

      Set-Location -Path .\usacloud
      (Get-Content '.\usacloud.nuspec' -Raw).Replace("__VERSION__", $appVeyorVersion) | Out-File '.\usacloud.nuspec' -Encoding utf8
      echo "replace usacloud.nuspec"
      echo "."
      Get-Content '.\usacloud.nuspec'
      echo "."
      (Get-Content '.\tools\chocolateyinstall.ps1' -Raw).Replace("__VERSION__", "v$version").Replace("__HASH32__", $hash32).Replace("__HASH64__", $hash64) | Out-File '.\tools\chocolateyinstall.ps1' -Encoding utf8
      echo "replace chocolateyinstall.ps1"
      echo "."
      Get-Content '.\tools\chocolateyinstall.ps1'
      echo "."
      choco pack

test_script:
  - ps: |
      $packName = 'usacloud'
      choco install $packName -s .\ -f
      usacloud --version
      choco uninstall $packName

deploy_script:
  - ps: |
      $nupkg = Get-ChildItem .\*.nupkg | Select-Object -First 1
      echo "Pushing $($nupkg.Name) to Chocolatey..."
      choco push $nupkg.FullName --source https://push.chocolatey.org/ --api-key $env:CHOCO_API_KEY

artifacts:
  - path: '.\usacloud\*.nupkg'
  - path: '.\usacloud\tools\*.ps1'
  - path: '.\usacloud\usacloud.nuspec'
